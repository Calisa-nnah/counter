<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sandra Lawal | Student ID: 76870</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #e9e9e9;
            padding: 20px;
        }

        .wrapper {
            width: 100%;
            max-width: 1050px;
            min-height: 88vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #f4b39d 0%, #f1caa9 30%, #d7c5dd 65%, #6da8ff 100%);
            border-bottom: 3px solid #222;
            padding: 40px 20px 60px;
        }

        h1 {
            font-size: 3.2rem;
            font-weight: 700;
            color: #111;
            margin-bottom: 30px;
        }

        #boxCounter {
            font-size: 7rem;
            font-weight: 700;
            color: #000;
            margin-bottom: 40px;
            line-height: 1;
        }

        #container-button {
            display: flex;
            gap: 28px;
            flex-wrap: wrap;
            justify-content: center;
        }

        #container-button button {
            min-width: 220px;
            padding: 18px 28px;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            border: 2px solid #444;
            border-radius: 8px;
            background: #f4f4f4;
            color: #1f2b3a;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.18);
            transition: all 0.2s ease;
        }

        #container-button button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.22);
        }

        #container-button button:active {
            transform: translateY(0);
        }

        #DecrementButton::before {
            content: "➖ ";
        }

        #ResetButton::before {
            content: "↺ ";
        }

        #IncrementButton::before {
            content: "➕ ";
        }

        @media (max-width: 768px) {
            .wrapper {
                min-height: auto;
                padding: 40px 15px;
            }

            h1 {
                font-size: 2.3rem;
            }

            #boxCounter {
                font-size: 5rem;
            }

            #container-button {
                gap: 16px;
            }

            #container-button button {
                min-width: 100%;
                font-size: 1rem;
                padding: 16px 20px;
            }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <h1>Counter</h1>

        <div id="boxCounter">0</div>

        <div id="container-button">
            <button id="DecrementButton">Decrease</button>
            <button id="ResetButton">Reset</button>
            <button id="IncrementButton">Increase</button>
        </div>
    </div>
    
    <script>
        const boxCounter = document.getElementById('boxCounter');
        const btncontainer = document.getElementById('container-button');

        btncontainer.addEventListener('click', (event) => {
            if (event.target.id === 'IncrementButton') {
                boxCounter.innerText = parseInt(boxCounter.innerText) + 1;
            } else if (event.target.id === 'DecrementButton') {
                boxCounter.innerText = parseInt(boxCounter.innerText) - 1;
            } else if (event.target.id === 'ResetButton') {
                boxCounter.innerText = 0;
            }

            if (parseInt(boxCounter.innerText) < 0) {
                boxCounter.style.color = '#ff0000';
            } else if (parseInt(boxCounter.innerText) > 0) {
                boxCounter.style.color = '#0000ff';
            } else {
                boxCounter.style.color = '#000000';
            }
        });
    </script>

</body>
</html>
